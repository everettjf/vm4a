# GitHub Pages site for VM4A — served from /docs on the default branch.
# Settings → Pages → Source: "Deploy from a branch" → main → /docs.
title: VM4A
description: >-
  Virtual Machines for Agents — spin up isolated macOS or Linux VMs on
  Apple Silicon for AI agents to safely run code in.

# Project page lives at https://<user>.github.io/vm4a/
url: https://everettjf.github.io
baseurl: /vm4a

# Theme: just-the-docs (sidebar nav + built-in search). Resolved by GitHub
# Pages via jekyll-remote-theme, so no vendored theme files are needed.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

color_scheme: dark
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Link back to the repo from the top-right.
aux_links:
  "GitHub ↗":
    - "https://github.com/everettjf/vm4a"
aux_links_new_tab: true

# Footer / edit links
back_to_top: true
back_to_top_text: "Back to top"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/everettjf/vm4a"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green

# These large reference docs live at the repo root, not in the site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
