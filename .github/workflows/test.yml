name: build & test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  swift-test:
    # macos-14 hosted runners include the Swift toolchain. They don't have
    # Apple Virtualization.framework runtime privileges (no actual VM start),
    # but the unit tests don't require booting a VM — they exercise types,
    # JSON encoding, the OCI parser, the HTTP/MCP wire format, sessions,
    # pools, and SSH/SCP helpers via /usr/bin/{true,sleep}.
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test --parallel
